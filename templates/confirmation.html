<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to {{ coop.name }}!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: #2c5f2d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        
        .success-icon::after {
            content: '✓';
            color: white;
            font-size: 50px;
            font-weight: bold;
        }
        
        h1 {
            color: #2c5f2d;
            margin-bottom: 15px;
        }
        
        .member-number {
            font-size: 24px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 30px;
        }
        
        .message {
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .info-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .info-box p {
            margin-bottom: 10px;
            color: #555;
        }
        
        .info-box p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon"></div>
        
        <h1>Welcome to {{ coop.name }}, {{ first_name }}!</h1>
        
        <div class="member-number">
            Your Member Number: <strong>#{{ member_number }}</strong>
        </div>
        
        <div class="message">
            <p>Thank you for becoming a member! We've sent a confirmation email to the address you provided.</p>
        </div>
        
        <div class="info-box">
            <p><strong>What's Next?</strong></p>
            <p>You'll receive additional information about your membership and how to get involved with the co-op.</p>
        </div>
    </div>
</body>
</html>
