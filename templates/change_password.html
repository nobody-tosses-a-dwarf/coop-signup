<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Co-op Signup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
        }
        
        h1 {
            color: #2c5f2d;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        input[type="password"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: #2c5f2d;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #2c5f2d;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        
        button:hover {
            background: #1e4220;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #fcc;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            color: #333;
        }
        
        .password-requirements {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Change Password</h1>
        <p class="subtitle">{{ email }}</p>
        
        {% if success %}
        <div class="success">
            Password changed successfully!
        </div>
        {% endif %}
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/change-password">
            <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required minlength="8">
                <div class="password-requirements">Minimum 8 characters</div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
            </div>
            
            <div class="form-group" style="margin-top:28px; padding-top:20px; border-top:1px solid #eee;">
                <label for="timezone">Display Timezone</label>
                <select id="timezone" name="timezone">
                    <option value="">Auto-detect (browser default)</option>
                    <optgroup label="US / Canada">
                        <option value="America/New_York" {% if current_timezone == 'America/New_York' %}selected{% endif %}>Eastern (New York)</option>
                        <option value="America/Chicago" {% if current_timezone == 'America/Chicago' %}selected{% endif %}>Central (Chicago)</option>
                        <option value="America/Denver" {% if current_timezone == 'America/Denver' %}selected{% endif %}>Mountain (Denver)</option>
                        <option value="America/Los_Angeles" {% if current_timezone == 'America/Los_Angeles' %}selected{% endif %}>Pacific (Los Angeles)</option>
                        <option value="America/Anchorage" {% if current_timezone == 'America/Anchorage' %}selected{% endif %}>Alaska (Anchorage)</option>
                        <option value="Pacific/Honolulu" {% if current_timezone == 'Pacific/Honolulu' %}selected{% endif %}>Hawaii (Honolulu)</option>
                        <option value="America/Halifax" {% if current_timezone == 'America/Halifax' %}selected{% endif %}>Atlantic (Halifax)</option>
                        <option value="America/Toronto" {% if current_timezone == 'America/Toronto' %}selected{% endif %}>Toronto</option>
                        <option value="America/Vancouver" {% if current_timezone == 'America/Vancouver' %}selected{% endif %}>Vancouver</option>
                    </optgroup>
                    <optgroup label="Europe">
                        <option value="Europe/London" {% if current_timezone == 'Europe/London' %}selected{% endif %}>London</option>
                        <option value="Europe/Paris" {% if current_timezone == 'Europe/Paris' %}selected{% endif %}>Paris / Berlin</option>
                        <option value="Europe/Helsinki" {% if current_timezone == 'Europe/Helsinki' %}selected{% endif %}>Helsinki / Athens</option>
                        <option value="Europe/Moscow" {% if current_timezone == 'Europe/Moscow' %}selected{% endif %}>Moscow</option>
                    </optgroup>
                    <optgroup label="Asia / Pacific">
                        <option value="Asia/Dubai" {% if current_timezone == 'Asia/Dubai' %}selected{% endif %}>Dubai</option>
                        <option value="Asia/Kolkata" {% if current_timezone == 'Asia/Kolkata' %}selected{% endif %}>India (Kolkata)</option>
                        <option value="Asia/Shanghai" {% if current_timezone == 'Asia/Shanghai' %}selected{% endif %}>China (Shanghai)</option>
                        <option value="Asia/Tokyo" {% if current_timezone == 'Asia/Tokyo' %}selected{% endif %}>Japan (Tokyo)</option>
                        <option value="Australia/Sydney" {% if current_timezone == 'Australia/Sydney' %}selected{% endif %}>Australia (Sydney)</option>
                        <option value="Australia/Perth" {% if current_timezone == 'Australia/Perth' %}selected{% endif %}>Australia (Perth)</option>
                        <option value="Pacific/Auckland" {% if current_timezone == 'Pacific/Auckland' %}selected{% endif %}>New Zealand (Auckland)</option>
                    </optgroup>
                    <optgroup label="Americas">
                        <option value="America/Sao_Paulo" {% if current_timezone == 'America/Sao_Paulo' %}selected{% endif %}>São Paulo</option>
                    </optgroup>
                    <optgroup label="Africa">
                        <option value="Africa/Johannesburg" {% if current_timezone == 'Africa/Johannesburg' %}selected{% endif %}>Johannesburg</option>
                    </optgroup>
                </select>
                <div class="password-requirements">Dates and times in the admin panel will use this timezone.</div>
            </div>

            <button type="submit">Save Changes</button>
        </form>
        
        <div class="back-link">
            <a href="javascript:history.back()">← Go Back</a>
        </div>
    </div>
</body>
</html>
