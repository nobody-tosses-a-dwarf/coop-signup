<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co-op Membership Signup</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #FAFAF7;
            --card-bg: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #5C5C5C;
            --accent: #2D6A4F;
            --accent-light: #D8F3DC;
            --border: #E5E5E0;
            --radius: 12px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        .coop-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .coop-card {
            display: block;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .coop-card:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 12px rgba(45, 106, 79, 0.08);
        }

        .coop-card h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }

        .coop-card .location {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .coop-card .arrow {
            float: right;
            color: var(--accent);
            font-size: 1.5rem;
            margin-top: -1.5rem;
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Community Co-op Membership</h1>
            <p>Select your co-op to sign up for membership</p>
        </div>

        <div class="coop-list">
            {% for coop in coops %}
            <a href="/{{ coop.slug }}" class="coop-card">
                <h2>{{ coop.name }}</h2>
                <span class="location">{{ coop.city }}, {{ coop.state }}</span>
                <span class="arrow">&rarr;</span>
            </a>
            {% endfor %}

            {% if not coops %}
            <div class="empty">
                <p>No co-ops registered yet.</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
